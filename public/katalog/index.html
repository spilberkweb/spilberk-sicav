<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Katalog — Spilberk investiční fond SICAV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #fff;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
      background: rgba(13,13,13,0.95);
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .logo-icon {
      width: 30px;
      height: 30px;
      background: #c9a84c;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #0d0d0d;
      font-size: 13px;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2.5px;
    }

    .logo-sub {
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.5px;
      margin-left: 6px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: #c9a84c;
      color: #0d0d0d;
      font-weight: 700;
      font-size: 12px;
      border: none;
      border-radius: 50px;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn svg { flex-shrink: 0; }

    /* Desktop: full iframe */
    .pdf-frame {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .pdf-frame iframe {
      flex: 1;
      width: 100%;
      border: none;
    }

    /* Mobile fallback — shown on narrow screens */
    .mobile-view {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 40px 24px;
      text-align: center;
    }

    .mobile-view .icon {
      width: 72px;
      height: 72px;
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mobile-view h2 {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.3;
    }

    .mobile-view p {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.6;
      max-width: 280px;
    }

    .btn-outline {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 22px;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      text-decoration: none;
    }

    @media (max-width: 680px) {
      .pdf-frame { display: none; }
      .mobile-view { display: flex; }
      .logo-sub { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">
      <div class="logo-icon">S</div>
      <div style="display:flex;align-items:baseline">
        <span class="logo-name">SPILBERK</span>
        <span class="logo-sub">investiční fond SICAV</span>
      </div>
    </a>
    <a href="/catalogue.pdf" download="Spilberk-katalog.pdf" class="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Stáhnout PDF
    </a>
  </header>

  <div class="pdf-frame">
    <iframe
      src="/catalogue.pdf"
      title="Spilberk investiční fond — katalog"
      loading="lazy"
    ></iframe>
  </div>

  <div class="mobile-view">
    <div class="icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
    </div>
    <h2>Katalog fondu</h2>
    <p>Pro zobrazení katalogu otevřete soubor nebo si jej stáhněte do zařízení.</p>
    <a href="/catalogue.pdf" class="btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Otevřít katalog
    </a>
    <a href="/catalogue.pdf" download="Spilberk-katalog.pdf" class="btn-outline">Stáhnout PDF</a>
  </div>
</body>
</html>
